<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC Demo</title>
  </head>
  <body>
    <h1>WebRTC Demo</h1>

    <h2>1. Start your camera</h2>
    <div class="videos">
      <span>
        <h3>Local Stream</h3>
        <video id="localVideo" autoplay playsinline></video>
      </span>
      <span>
        <h3>Remote Stream</h3>
        <video id="remoteVideo" autoplay playsinline></video>
      </span>
    </div>
    <button id="startVideoBtn">Start Camera</button>

    <h2>2. Create Peer Connection</h2>
    <button id="callBtn" disabled>Create Call</button>

    <h2>3. Join a call</h2>
    <input id="joinInput" type="text" placeholder="Enter Call ID" />
    <button id="joinBtn" disabled>Join Call</button>

    <h2>4. Hangup</h2>
    <button id="hangupBtn" disabled>Hang Up</button>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
